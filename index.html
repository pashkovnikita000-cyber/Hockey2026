const TCOLS={FIN:'#003899',GER:'#222',CAN:'#cc1122',SWE:'#006aa7',USA:'#002868',SUI:'#cc1122',CZE:'#d7141a',DEN:'#c60c30',GBR:'#012169',AUT:'#ed2939',SVK:'#0b4ea2',NOR:'#ef2b2d',HUN:'#588157',LAT:'#8b2635',SLO:'#003da5',ITA:'#009246',TBD:'#333'};

const api=async(method,table,qs='',body,tok)=>{

const authApi=async(path,body)=>{try{const r=await fetch(`${SUPA}/auth/v1/${path}`,{method:'POST',headers:{apikey:AKEY,'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}catch{return{};}};

const calcPts=(p,m)=>{if(m.home_score==null)return null;if(p.pred_home===m.home_score&&p.pred_away===m.away_score)return 3;return Math.sign(p.pred_home-p.pred_away)===Math.sign(m.home_score-m.away_score)?1:0;};
const groupByDay=arr=>{const g={};arr.forEach(m=>{const k=new Date(m.match_time).toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});if(!g[k])g[k]=[];g[k].push(m);});return Object.entries(g);};

  </div>
));

const Countdown=()=>{
  const [t,setT]=useState(null);
  useEffect(()=>{const target=new Date('2026-05-15T14:20:00Z');const tick=()=>{const diff=target-Date.now();if(diff<=0){setT(null);return;}setT({d:Math.floor(diff/864e5),h:Math.floor(diff%864e5/36e5),m:Math.floor(diff%36e5/6e4),s:Math.floor(diff%6e4/1e3)});};tick();const id=setInterval(tick,1000);return()=>clearInterval(id);},[]);
  if(!t)return null;

  return(<div style={{background:'linear-gradient(135deg,rgba(56,197,255,.07),rgba(0,80,255,.05))',border:'1px solid rgba(56,197,255,.17)',borderRadius:16,padding:'14px 20px',marginBottom:18,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
    <div style={{flex:1,minWidth:130}}><div style={{fontSize:'.63rem',color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.1em'}}>До старта турнира</div><div style={{color:'#fff',fontWeight:700,fontSize:'.88rem',marginTop:3}}>🏒 IIHF WM 2026 · Швейцария</div></div>
    <div style={{display:'flex',gap:10,alignItems:'center'}}><C v={t.d} l="дней"/><span style={{color:'rgba(255,255,255,.15)',fontSize:'1.4rem',marginBottom:8}}>:</span><C v={t.h} l="часов"/><span style={{color:'rgba(255,255,255,.15)',fontSize:'1.4rem',marginBottom:8}}>:</span><C v={t.m} l="минут"/><span style={{color:'rgba(255,255,255,.15)',fontSize:'1.4rem',marginBottom:8}}>:</span><C v={t.s} l="секунд"/></div>
  </div>);
};

// PROFILE MODAL
// ══════════════════════════════════════════════
const ProfileModal=({user,myPreds,matches,onClose})=>{
  const uName=user?.user_metadata?.full_name||user?.user_metadata?.name||user?.email?.split('@')[0]||'';
  const uAv=user?.user_metadata?.avatar_url||user?.user_metadata?.picture||'';

  // compute stats
  const stats=useMemo(()=>{
    const preds=Object.entries(myPreds);
    const mm={};matches.forEach(m=>{mm[m.id]=m;});
    let total=preds.length,exact=0,win=0,miss=0,pts=0,settled=0;
    const history=[];
    preds.forEach(([mid,p])=>{
      const m=mm[parseInt(mid)];if(!m)return;
      const s=calcPts(p,m);
      history.push({m,p,pts:s});
      if(s===null)return;
      settled++;pts+=s;
      if(s===3)exact++;else if(s===1)win++;else miss++;
    });
    history.sort((a,b)=>new Date(b.m.match_time)-new Date(a.m.match_time));
    const acc=settled>0?Math.round((exact+win)/settled*100):0;
    return{total,exact,win,miss,pts,settled,acc,history};
  },[myPreds,matches]);

  const StatCard=({label,value,sub,color='#38c5ff'})=>(
    <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,padding:'12px 14px',textAlign:'center'}}>
      <div style={{fontSize:'1.6rem',fontWeight:900,color,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{value}</div>
      {sub&&<div style={{fontSize:'.62rem',color,opacity:.7,fontWeight:600,marginTop:1}}>{sub}</div>}
      <div style={{fontSize:'.68rem',color:'rgba(255,255,255,.35)',marginTop:4}}>{label}</div>
    </div>
  );

  const pct=v=>stats.settled>0?Math.round(v/stats.settled*100):0;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:300,padding:'0'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#0b0e1e',border:'1px solid rgba(56,197,255,.15)',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:640,maxHeight:'90vh',overflow:'hidden',display:'flex',flexDirection:'column',animation:'slideUp .3s ease'}}>

        {/* Handle */}
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 0'}}>
          <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,.15)'}}/>
        </div>

        {/* Header */}
        <div style={{padding:'16px 20px 0',display:'flex',alignItems:'center',gap:14}}>
          {uAv
            ?<img src={uAv} style={{width:56,height:56,borderRadius:'50%',border:'2px solid rgba(56,197,255,.4)',flexShrink:0}} alt=""/>
            :<div style={{width:56,height:56,borderRadius:'50%',background:'rgba(56,197,255,.12)',border:'2px solid rgba(56,197,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',color:'#38c5ff',fontWeight:900,fontSize:'1.4rem',flexShrink:0}}>{(uName[0]||'?').toUpperCase()}</div>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:'#fff',fontWeight:800,fontSize:'1.1rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{uName}</div>
            <div style={{color:'rgba(255,255,255,.35)',fontSize:'.75rem',marginTop:2}}>{user?.email}</div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:5}}>
              <div style={{background:'rgba(56,197,255,.12)',border:'1px solid rgba(56,197,255,.25)',borderRadius:20,padding:'2px 10px',fontSize:'.68rem',color:'#38c5ff',fontWeight:700}}>
                🏒 Участник WM 2026
              </div>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:50,width:32,height:32,color:'rgba(255,255,255,.5)',cursor:'pointer',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
        </div>

        {/* Scrollable content */}
        <div style={{overflowY:'auto',padding:'16px 20px 24px',flex:1}}>

          {/* Stats grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:18}}>
            <StatCard label="Очков" value={stats.pts} color='#f4b942'/>
            <StatCard label="Ставок" value={stats.total}/>
            <StatCard label="Точность" value={`${stats.acc}%`} color='#4ade80'/>
            <StatCard label="Завершено" value={stats.settled}/>
          </div>

          {/* Breakdown bars */}
          {stats.settled>0&&(
            <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,padding:'14px 16px',marginBottom:18}}>
              <div style={{fontSize:'.72rem',color:'rgba(255,255,255,.4)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Разбивка результатов</div>
              {[
                {label:'🎯 Точный счёт',val:stats.exact,color:'#f4b942',pts:'+3'},
                {label:'✅ Угадал победителя',val:stats.win,color:'#4ade80',pts:'+1'},
                {label:'❌ Промах',val:stats.miss,color:'#f87171',pts:'0'},
              ].map(({label,val,color,pts})=>(
                <div key={label} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:'.78rem',color:'rgba(255,255,255,.65)'}}>{label}</span>
                    <span style={{fontSize:'.78rem',fontWeight:700,color}}>{val} <span style={{color:'rgba(255,255,255,.3)',fontWeight:400,fontSize:'.7rem'}}>({pct(val)}%)</span></span>
                  </div>
                  <div style={{height:5,background:'rgba(255,255,255,.06)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',background:color,borderRadius:3,width:`${pct(val)}%`,transition:'width .6s ease',opacity:.85}}/>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* History */}
          <div style={{fontSize:'.72rem',color:'rgba(255,255,255,.4)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>
            История ставок {stats.total>0&&<span style={{color:'rgba(255,255,255,.2)',fontWeight:400,textTransform:'none',letterSpacing:0}}>({stats.total})</span>}
          </div>

          {stats.history.length===0?(
            <div style={{textAlign:'center',padding:'28px 20px',color:'rgba(255,255,255,.25)',fontSize:'.85rem'}}>
              <div style={{fontSize:32,marginBottom:8}}>🎯</div>
              Ещё нет ставок — делай прогнозы!
            </div>
          ):(
            stats.history.map(({m,p,pts:s},i)=>{
              const fin=m.status==='finished'&&m.home_score!=null;
              const pc=s===3?'#f4b942':s===1?'#4ade80':s===0?'#f87171':null;
              const tStr=new Date(m.match_time).toLocaleDateString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
              return(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 13px',marginBottom:6,background:'rgba(255,255,255,.025)',border:'1px solid rgba(255,255,255,.05)',borderRadius:12,transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.045)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.025)'}>
                  {/* Teams */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                      <span style={{fontSize:15}}>{FLAGS[m.home_team]||'🏒'}</span>
                      <span style={{color:'rgba(255,255,255,.5)',fontSize:'.7rem',fontWeight:700}}>{m.home_team}</span>
                      <span style={{color:'rgba(255,255,255,.2)',fontSize:'.68rem',margin:'0 2px'}}>vs</span>
                      <span style={{color:'rgba(255,255,255,.5)',fontSize:'.7rem',fontWeight:700}}>{m.away_team}</span>
                      <span style={{fontSize:15}}>{FLAGS[m.away_team]||'🏒'}</span>
                    </div>
                    <div style={{color:'rgba(255,255,255,.22)',fontSize:'.65rem'}}>{tStr}</div>
                  </div>
                  {/* Scores */}
                  <div style={{textAlign:'center',minWidth:90}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center'}}>
                      <div style={{textAlign:'center'}}>
                        <div style={{fontSize:'.58rem',color:'rgba(255,255,255,.25)',marginBottom:2}}>прогноз</div>
                        <div style={{color:'#fff',fontWeight:800,fontSize:'.95rem',fontVariantNumeric:'tabular-nums'}}>{p.pred_home}:{p.pred_away}</div>
                      </div>
                      {fin&&<>
                        <div style={{color:'rgba(255,255,255,.15)',fontSize:'.7rem'}}>→</div>
                        <div style={{textAlign:'center'}}>
                          <div style={{fontSize:'.58rem',color:'rgba(255,255,255,.25)',marginBottom:2}}>итог</div>
                          <div style={{color:'rgba(255,255,255,.7)',fontWeight:700,fontSize:'.95rem',fontVariantNumeric:'tabular-nums'}}>{m.home_score}:{m.away_score}</div>
                        </div>
                      </>}
                      {!fin&&<div style={{color:'rgba(255,255,255,.2)',fontSize:'.65rem',marginLeft:4}}>ожидаем</div>}
                    </div>
                  </div>
                  {/* Points badge */}
                  <div style={{minWidth:46,textAlign:'right'}}>
                    {s!==null
                      ?<span style={{background:pc+'22',color:pc,borderRadius:20,padding:'3px 9px',fontWeight:800,fontSize:'.78rem',display:'inline-block'}}>{s===3?'+3':s===1?'+1':'0'}</span>
                      :<span style={{color:'rgba(255,255,255,.2)',fontSize:'.72rem'}}>—</span>}
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
};

function App(){
  const [user,setUser]=useState(_user);
  const [tok,setTok]=useState(_tok);
  const [tab,setTab]=useState('matches');
  const [filter,setFilter]=useState('all');
  const [matches,setMatches]=useState([]);
  const [myPreds,setMyPreds]=useState({});
  const [inputs,setInputs]=useState({});
  const [saving,setSaving]=useState({});
  const [flash,setFlash]=useState({});
  const [allPreds,setAllPreds]=useState([]);
  const [profs,setProfs]=useState({});
  const [showAuth,setShowAuth]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [authMode,setAuthMode]=useState('signin');
  const [fd,setFd]=useState({email:'',pwd:'',name:''});
  const [msg,setMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const [adminId,setAdminId]=useState(null);
  const [adminS,setAdminS]=useState({h:'',a:''});
  const now=useMemo(()=>new Date(),[]);

  const saveTok=(t)=>{_tok=t;localStorage.setItem('hk_tok',t);setTok(t);};
  const clearTok=()=>{_tok=null;localStorage.removeItem('hk_tok');setTok(null);};

  useEffect(()=>{
    const hash=new URLSearchParams(window.location.hash.replace('#',''));
    const hashTok=hash.get('access_token');
    if(hashTok){if(window.opener){window.opener.postMessage({type:'SUPABASE_TOKEN',access_token:hashTok},'*');window.close();return;}history.replaceState({},'',location.pathname);loginWithToken(hashTok);return;}
    const onMsg=(e)=>{if(e.data?.type==='SUPABASE_TOKEN'&&e.data.access_token)loginWithToken(e.data.access_token);};
    window.addEventListener('message',onMsg);
    if(_tok)loginWithToken(_tok,true);
    loadMatches();
    return()=>window.removeEventListener('message',onMsg);
  },[]);

  useEffect(()=>{if(user&&_tok)loadMyPreds();else setMyPreds({});},[user,tok]);
  useEffect(()=>{if(tab==='leaderboard')loadBoard();},[tab]);

  const loginWithToken=async(t,silent=false)=>{const u=await fetchUser(t);if(u?.id){_user=u;saveTok(t);setUser(u);if(!silent)setShowAuth(false);}else{clearTok();setUser(null);}};
  const logout=()=>{clearTok();_user=null;setUser(null);setMyPreds({});setShowProfile(false);};
  const loadMatches=async()=>{const d=await api('GET','matches','?order=match_time.asc');setMatches(d||[]);};
  const loadMyPreds=async()=>{if(!_tok||!_user)return;const d=await api('GET','predictions',`?user_id=eq.${_user.id}&select=match_id,pred_home,pred_away`,null,_tok);const m={};(d||[]).forEach(p=>{m[p.match_id]=p;});setMyPreds(m);};
  const loadBoard=async()=>{const[pds,prs]=await Promise.all([api('GET','predictions','?select=user_id,match_id,pred_home,pred_away'),api('GET','profiles','?select=id,display_name,avatar_url')]);setAllPreds(pds||[]);const m={};(prs||[]).forEach(p=>{m[p.id]=p;});setProfs(m);};

  const board=useMemo(()=>{const mm={};matches.forEach(m=>{mm[m.id]=m;});const up={};(allPreds||[]).forEach(p=>{const m=mm[p.match_id];if(!m)return;const pts=calcPts(p,m)||0;if(!up[p.user_id])up[p.user_id]={pts:0,cnt:0};up[p.user_id].pts+=pts;up[p.user_id].cnt++;});return Object.entries(up).map(([uid,s])=>({uid,...s,prof:profs[uid]})).sort((a,b)=>b.pts-a.pts);},[allPreds,matches,profs]);

  const filtered=useMemo(()=>{const d0=new Date();d0.setHours(0,0,0,0);const d1=new Date(d0);d1.setDate(d1.getDate()+1);const d2=new Date(d0);d2.setDate(d2.getDate()+2);const d7=new Date(d0);d7.setDate(d7.getDate()+7);return matches.filter(m=>{const t=new Date(m.match_time);if(filter==='today')return t>=d0&&t<d1;if(filter==='tomorrow')return t>=d1&&t<d2;if(filter==='week')return t>=d0&&t<d7;return true;});},[matches,filter]);
  const grouped=useMemo(()=>groupByDay(filtered),[filtered]);

  const signIn=async()=>{setBusy(true);setMsg('');const r=await authApi('token?grant_type=password',{email:fd.email,password:fd.pwd});setBusy(false);if(r.access_token)loginWithToken(r.access_token);else setMsg(r.error_description||r.msg||'Неверный email или пароль');};
  const signUp=async()=>{setBusy(true);setMsg('');const r=await authApi('signup',{email:fd.email,password:fd.pwd,data:{full_name:fd.name}});setBusy(false);if(r.user)setMsg('✅ Письмо отправлено! Подтверди email и войди.');else setMsg(r.error_description||r.msg||'Ошибка');};
  const googleAuth=()=>window.open(`${SUPA}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(location.href.split('#')[0])}`,'gauth','width=500,height=700,top=60,left=160');

  const savePred=async(matchId)=>{
    if(!user||!_tok){setShowAuth(true);return;}
    const inp=inputs[matchId]||{},ex=myPreds[matchId];
    const rawH=inp.h!==undefined?inp.h:(ex?.pred_home!==undefined?String(ex.pred_home):'');
    const rawA=inp.a!==undefined?inp.a:(ex?.pred_away!==undefined?String(ex.pred_away):'');
    const ph=parseInt(rawH,10),pa=parseInt(rawA,10);
    if(isNaN(ph)||isNaN(pa)){setFlash(p=>({...p,[matchId]:'err'}));setTimeout(()=>setFlash(p=>({...p,[matchId]:null})),2000);return;}
    setSaving(p=>({...p,[matchId]:true}));
    if(ex)await api('PATCH','predictions',`?user_id=eq.${user.id}&match_id=eq.${matchId}`,{pred_home:ph,pred_away:pa,updated_at:new Date().toISOString()},_tok);
    else await api('POST','predictions','',{user_id:user.id,match_id:matchId,pred_home:ph,pred_away:pa},_tok);
    await loadMyPreds();
    setSaving(p=>({...p,[matchId]:false}));setFlash(p=>({...p,[matchId]:'ok'}));setTimeout(()=>setFlash(p=>({...p,[matchId]:null})),2400);
  };

  const saveScore=async()=>{const h=parseInt(adminS.h),a=parseInt(adminS.a);if(isNaN(h)||isNaN(a))return;await api('PATCH','matches',`?id=eq.${adminId}`,{home_score:h,away_score:a,status:'finished'},_tok);setMatches(p=>p.map(m=>m.id===adminId?{...m,home_score:h,away_score:a,status:'finished'}:m));setAdminId(null);};

  const uName=user?.user_metadata?.full_name||user?.user_metadata?.name||user?.email?.split('@')[0]||'';
  const uAv=user?.user_metadata?.avatar_url||user?.user_metadata?.picture||'';

  // ── Match Card ──
  const MatchCard=({match:m})=>{
    const pred=myPreds[m.id],inp=inputs[m.id]||{};
    const hV=inp.h!==undefined?inp.h:(pred?.pred_home!==undefined?String(pred.pred_home):'');
    const aV=inp.a!==undefined?inp.a:(pred?.pred_away!==undefined?String(pred.pred_away):'');
    const past=new Date(m.match_time)<now,fin=m.status==='finished'&&m.home_score!=null;
    const pts=pred&&m.home_score!=null?calcPts(pred,m):null;
    const pc=pts===3?'#f4b942':pts===1?'#4ade80':pts===0?'#f87171':null;
    const tStr=new Date(m.match_time).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const dStr=new Date(m.match_time).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    const playoff=['QF','SF','Bronze','Gold'].includes(m.group_name);
    const plbl={QF:'Четвертьфинал',SF:'Полуфинал',Bronze:'За бронзу',Gold:'Финал'}[m.group_name];
    const hWin=fin&&m.home_score>m.away_score,aWin=fin&&m.away_score>m.home_score;
    const st=flash[m.id],isSaving=saving[m.id];
    return(
      <div className="card" style={{marginBottom:10}}>
        <div style={{height:3,background:`linear-gradient(90deg,${TCOLS[m.home_team]||'#222'} 0%,${TCOLS[m.home_team]||'#222'} 42%,transparent 50%,${TCOLS[m.away_team]||'#222'} 58%,${TCOLS[m.away_team]||'#222'} 100%)`}}/>
        <div style={{padding:'14px 16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{flex:1,textAlign:'center',position:'relative'}}>
              {hWin&&<div style={{position:'absolute',top:-4,right:2,fontSize:'.58rem',color:'#4ade80',fontWeight:700,background:'rgba(74,222,128,.1)',padding:'1px 5px',borderRadius:4}}>ПОБ</div>}
              <div style={{fontSize:28}}>{FLAGS[m.home_team]||'🏒'}</div>
              <div style={{color:hWin?'#fff':'rgba(255,255,255,.88)',fontWeight:800,fontSize:'.84rem',marginTop:4,lineHeight:1.2}}>{NAMES[m.home_team]||m.home_team}</div>
            </div>
            <div style={{textAlign:'center',minWidth:100,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              {fin?(<div style={{display:'flex',alignItems:'center',gap:7}}><span style={{color:hWin?'#fff':'rgba(255,255,255,.55)',fontSize:'2rem',fontWeight:900,fontVariantNumeric:'tabular-nums'}}>{m.home_score}</span><span style={{color:'rgba(255,255,255,.18)',fontSize:'1.1rem',fontWeight:200}}>:</span><span style={{color:aWin?'#fff':'rgba(255,255,255,.55)',fontSize:'2rem',fontWeight:900,fontVariantNumeric:'tabular-nums'}}>{m.away_score}</span></div>):(<div style={{background:'rgba(56,197,255,.1)',border:'1px solid rgba(56,197,255,.2)',borderRadius:7,padding:'3px 14px'}}><span style={{color:'#38c5ff',fontWeight:700,fontSize:'.85rem',letterSpacing:'2px'}}>VS</span></div>)}
              <div style={{color:'rgba(255,255,255,.4)',fontSize:'.68rem',fontWeight:600}}>{tStr} · {dStr}</div>
              <div style={{color:'rgba(255,255,255,.2)',fontSize:'.6rem',textAlign:'center',maxWidth:88,lineHeight:1.3}}>{m.venue?.split(',')[0]}</div>
              {!playoff&&m.group_name&&<span style={{background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)',borderRadius:4,padding:'1px 8px',fontSize:'.6rem',fontWeight:700}}>ГР. {m.group_name}</span>}
              {playoff&&<span style={{background:'rgba(244,185,66,.1)',color:'#f4b942',borderRadius:4,padding:'1px 8px',fontSize:'.6rem',fontWeight:700}}>🏆 {plbl}</span>}
            </div>
            <div style={{flex:1,textAlign:'center',position:'relative'}}>
              {aWin&&<div style={{position:'absolute',top:-4,left:2,fontSize:'.58rem',color:'#4ade80',fontWeight:700,background:'rgba(74,222,128,.1)',padding:'1px 5px',borderRadius:4}}>ПОБ</div>}
              <div style={{fontSize:28}}>{FLAGS[m.away_team]||'🏒'}</div>
              <div style={{color:aWin?'#fff':'rgba(255,255,255,.88)',fontWeight:800,fontSize:'.84rem',marginTop:4,lineHeight:1.2}}>{NAMES[m.away_team]||m.away_team}</div>
            </div>
          </div>
          {!past&&m.home_team!=='TBD'&&(
            <div style={{marginTop:12,paddingTop:11,borderTop:'1px solid rgba(255,255,255,.05)'}}>
              {!user?(<button className="btn" style={{width:'100%',padding:'10px',fontSize:'.85rem'}} onClick={()=>setShowAuth(true)}>🔐 Войди, чтобы поставить прогноз</button>):(
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{color:'rgba(255,255,255,.28)',fontSize:'.74rem',flex:'1 1 60px',minWidth:60}}>{pred?'✏️ Изменить':'🎯 Прогноз'}</span>
                  <input className="si" type="number" min="0" max="99" placeholder="0" value={hV} onChange={e=>setInputs(p=>({...p,[m.id]:{...(p[m.id]||{}),h:e.target.value.replace(/\D/g,'').slice(0,2)}}))}/>
                  <span style={{color:'rgba(255,255,255,.2)',fontSize:'1.1rem'}}>:</span>
                  <input className="si" type="number" min="0" max="99" placeholder="0" value={aV} onChange={e=>setInputs(p=>({...p,[m.id]:{...(p[m.id]||{}),a:e.target.value.replace(/\D/g,'').slice(0,2)}}))}/>
                  <button className={`btn${st==='ok'?' btn-ok':st==='err'?' btn-err':''}`} style={{flex:'1 1 100px',maxWidth:150}} disabled={isSaving} onClick={()=>savePred(m.id)}>
                    {isSaving?<span className="spinner"/>:st==='ok'?'✓ Сохранено!':st==='err'?'⚠ Введи счёт':pred?'Обновить →':'Поставить →'}
                  </button>
                </div>
              )}
            </div>
          )}
          {past&&pred&&(
            <div style={{marginTop:9,paddingTop:9,borderTop:'1px solid rgba(255,255,255,.045)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
              <span style={{color:'rgba(255,255,255,.3)',fontSize:'.76rem'}}>Прогноз: <strong style={{color:'#fff'}}>{pred.pred_home}:{pred.pred_away}</strong></span>
              {pts!==null&&<span style={{background:pc+'22',color:pc,borderRadius:100,padding:'3px 12px',fontWeight:700,fontSize:'.78rem'}}>{pts===3?'🎯 +3 pts':pts===1?'✅ +1 pt':'❌ 0 pts'}</span>}
            </div>
          )}
          {user&&past&&!fin&&(
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,.035)'}}>
              {adminId===m.id?(
                <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{color:'rgba(255,255,255,.28)',fontSize:'.72rem'}}>Итог:</span>
                  <input className="si" style={{width:42,height:36,fontSize:'.95rem'}} placeholder="0" value={adminS.h} onChange={e=>setAdminS(p=>({...p,h:e.target.value.replace(/\D/g,'')}))}/>
                  <span style={{color:'rgba(255,255,255,.2)'}}>:</span>
                  <input className="si" style={{width:42,height:36,fontSize:'.95rem'}} placeholder="0" value={adminS.a} onChange={e=>setAdminS(p=>({...p,a:e.target.value.replace(/\D/g,'')}))}/>
                  <button className="btn" style={{padding:'7px 14px',fontSize:'.78rem'}} onClick={saveScore}>💾 Записать</button>
                  <button className="ghost" style={{padding:'7px 10px'}} onClick={()=>setAdminId(null)}>✕</button>
                </div>
              ):(
                <button className="ghost" style={{padding:'4px 11px',fontSize:'.7rem'}} onClick={()=>{setAdminId(m.id);setAdminS({h:'',a:''});}}>📝 Ввести результат</button>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── Auth Modal ──
  const AuthModal=()=>(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16,animation:'popIn .2s ease'}} onClick={e=>{if(e.target===e.currentTarget)setShowAuth(false);}}>
      <div style={{background:'#0d1225',border:'1px solid rgba(56,197,255,.2)',borderRadius:24,padding:'28px 26px',width:'100%',maxWidth:380,boxShadow:'0 24px 80px rgba(0,0,0,.65)'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:32,marginBottom:8}}>🏒</div>
          <h2 style={{color:'#fff',fontWeight:800,fontSize:'1.35rem',margin:'0 0 4px'}}>{authMode==='signin'?'Добро пожаловать!':'Регистрация'}</h2>
          <p style={{color:'rgba(255,255,255,.35)',fontSize:'.82rem',margin:0}}>{authMode==='signin'?'Войди, чтобы делать прогнозы':'Создай аккаунт и участвуй'}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {authMode==='signup'&&<input className="ai" placeholder="Имя" value={fd.name} onChange={e=>setFd(p=>({...p,name:e.target.value}))}/>}
          <input className="ai" placeholder="Email" type="email" value={fd.email} onChange={e=>setFd(p=>({...p,email:e.target.value}))}/>
          <input className="ai" placeholder="Пароль (мин. 6 символов)" type="password" value={fd.pwd} onChange={e=>setFd(p=>({...p,pwd:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&(authMode==='signin'?signIn():signUp())}/>
          {msg&&<p style={{color:msg.startsWith('✅')?'#4ade80':'#f87171',margin:0,fontSize:'.8rem'}}>{msg}</p>}
          <button className="btn" style={{width:'100%',padding:'13px',fontSize:'.93rem'}} disabled={busy} onClick={authMode==='signin'?signIn:signUp}>{busy?<span className="spinner"/>:authMode==='signin'?'→ Войти':'→ Зарегистрироваться'}</button>
          <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{flex:1,height:1,background:'rgba(255,255,255,.07)'}}/><span style={{color:'rgba(255,255,255,.2)',fontSize:'.76rem'}}>или</span><div style={{flex:1,height:1,background:'rgba(255,255,255,.07)'}}/></div>
          <button onClick={googleAuth} style={{background:'#fff',color:'#1e1e1e',border:'none',borderRadius:12,padding:'12px',fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:9,fontSize:'.9rem'}}>
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Войти через Google
          </button>
          <p style={{color:'rgba(255,255,255,.3)',textAlign:'center',fontSize:'.8rem'}}>
            {authMode==='signin'?<><span style={{color:'rgba(255,255,255,.3)'}}>Нет аккаунта? </span><span style={{color:'#38c5ff',cursor:'pointer',fontWeight:600}} onClick={()=>{setAuthMode('signup');setMsg('');}}>Зарегистрируйся</span></> :<><span style={{color:'rgba(255,255,255,.3)'}}>Уже есть? </span><span style={{color:'#38c5ff',cursor:'pointer',fontWeight:600}} onClick={()=>{setAuthMode('signin');setMsg('');}}>Войди</span></>}
          </p>
        </div>
      </div>
    </div>
  );

  // ── Leaderboard ──
  const Leaderboard=()=>{
    const podC=[{c:'#f4b942',bg:'rgba(244,185,66,.09)',bdr:'rgba(244,185,66,.28)',h:128,sz:42,e:'🥇'},{c:'#c0c0c0',bg:'rgba(192,192,192,.07)',bdr:'rgba(192,192,192,.18)',h:106,sz:36,e:'🥈'},{c:'#cd7f32',bg:'rgba(205,127,50,.07)',bdr:'rgba(205,127,50,.18)',h:90,sz:30,e:'🥉'}];
    const Av=({p,sz,c})=>p?.avatar_url?<img src={p.avatar_url} style={{width:sz,height:sz,borderRadius:'50%',border:`2px solid ${c}`,display:'block',margin:'0 auto 5px'}} alt=""/>:<div style={{width:sz,height:sz,borderRadius:'50%',background:`${c}18`,border:`1px solid ${c}40`,display:'flex',alignItems:'center',justifyContent:'center',color:c,fontWeight:700,fontSize:sz*.38,margin:'0 auto 5px'}}>{(p?.display_name||'?')[0].toUpperCase()}</div>;
    return(<div>{board.length===0?(<div style={{textAlign:'center',padding:'60px 20px',color:'rgba(255,255,255,.3)'}}><div style={{fontSize:44,marginBottom:12}}>🏆</div>Ещё нет прогнозов. Будь первым!</div>):(<>
      {board.length>=3&&(<div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:5,marginBottom:18}}>{[1,0,2].map(rank=>{const item=board[rank];const pc=podC[rank];return(<div key={rank} style={{flex:1,background:pc.bg,border:`1px solid ${pc.bdr}`,borderRadius:'12px 12px 0 0',padding:'12px 6px',textAlign:'center',minHeight:pc.h,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}><div style={{fontSize:rank===0?26:22,marginBottom:3}}>{pc.e}</div><Av p={item.prof} sz={pc.sz} c={pc.c}/><div style={{color:'#fff',fontWeight:700,fontSize:'.76rem',maxWidth:88,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.prof?.display_name||'Аноним'}</div><div style={{color:pc.c,fontWeight:900,fontSize:rank===0?'1.25rem':'1.05rem',lineHeight:1,marginTop:3}}>{item.pts}<span style={{fontSize:'.6rem',color:'rgba(255,255,255,.3)',fontWeight:400,marginLeft:2}}>pts</span></div></div>);})})</div>)}
      {board.slice(3).map((item,i)=>(<div key={item.uid} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',marginBottom:6,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.05)',borderRadius:11,transition:'transform .15s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateX(3px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}><div style={{color:'rgba(255,255,255,.25)',fontWeight:700,fontSize:'.85rem',minWidth:24}}>#{i+4}</div>{item.prof?.avatar_url?<img src={item.prof.avatar_url} style={{width:32,height:32,borderRadius:'50%'}} alt=""/>:<div style={{width:32,height:32,borderRadius:'50%',background:'rgba(56,197,255,.1)',border:'1px solid rgba(56,197,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',color:'#38c5ff',fontWeight:700,fontSize:'.82rem'}}>{(item.prof?.display_name||'?')[0].toUpperCase()}</div>}<div style={{flex:1}}><div style={{color:'#fff',fontWeight:700,fontSize:'.88rem'}}>{item.prof?.display_name||'Аноним'}</div><div style={{color:'rgba(255,255,255,.25)',fontSize:'.7rem'}}>{item.cnt} прогнозов</div></div><div style={{color:'#38c5ff',fontWeight:800,fontSize:'1.05rem'}}>{item.pts}<span style={{fontSize:'.62rem',color:'rgba(255,255,255,.25)',marginLeft:2}}>pts</span></div></div>))}
      <div style={{marginTop:16,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.05)',borderRadius:11,padding:'11px 15px',textAlign:'center'}}><span style={{color:'rgba(255,255,255,.38)',fontSize:'.77rem'}}>🎯 <strong style={{color:'#f4b942'}}>+3</strong> точный счёт &nbsp;·&nbsp; ✅ <strong style={{color:'#4ade80'}}>+1</strong> победитель &nbsp;·&nbsp; ❌ <strong>0</strong> промах</span></div>
    </>)}</div>);
  };

  return(
    <div style={{minHeight:'100vh',background:'#04060d',position:'relative'}}>
      <Bg/>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(4,6,13,.93)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(255,255,255,.05)',padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <span style={{fontSize:22}}>🏒</span>
          <div>
            <div style={{fontWeight:900,fontSize:'1rem',background:'linear-gradient(90deg,#38c5ff,#6699ff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-.4px'}}>IIHF WM 2026</div>
            <div style={{color:'rgba(255,255,255,.25)',fontSize:'.58rem',letterSpacing:'.12em',marginTop:1}}>ПРОГНОЗЫ · ШВЕЙЦАРИЯ</div>
          </div>
        </div>
        {user?(
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {/* Clickable avatar */}
            <div className="av-btn" onClick={()=>setShowProfile(true)} title="Мой профиль">
              {uAv
                ?<img src={uAv} style={{width:34,height:34,borderRadius:'50%',border:'2px solid rgba(56,197,255,.4)',display:'block'}} alt=""/>
                :<div style={{width:34,height:34,borderRadius:'50%',background:'rgba(56,197,255,.12)',border:'2px solid rgba(56,197,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',color:'#38c5ff',fontWeight:700,fontSize:'.88rem'}}>{(uName[0]||'?').toUpperCase()}</div>}
            </div>
            <span style={{color:'rgba(255,255,255,.6)',fontSize:'.83rem',fontWeight:600,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}} onClick={()=>setShowProfile(true)}>{uName}</span>
            <button className="ghost" onClick={logout}>Выйти</button>
          </div>
        ):(
          <button className="btn" style={{padding:'8px 18px'}} onClick={()=>setShowAuth(true)}>Войти →</button>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',justifyContent:'center',gap:6,padding:'14px 16px 0',position:'relative',zIndex:1}}>
        {[['matches','🏒 Матчи'],['leaderboard','🏆 Лидерборд']].map(([id,l])=>(
          <button key={id} className="tab" onClick={()=>setTab(id)} style={{background:tab===id?'linear-gradient(135deg,#38c5ff,#0055ff)':'rgba(255,255,255,.05)',color:tab===id?'#fff':'rgba(255,255,255,.4)',border:tab===id?'none':'1px solid rgba(255,255,255,.07)'}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{maxWidth:640,margin:'0 auto',padding:'14px 10px 70px',position:'relative',zIndex:1}}>
        {tab==='matches'&&(<>
          <Countdown/>
          <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
            {[['today','Сегодня'],['tomorrow','Завтра'],['week','Неделя'],['all','Все']].map(([id,l])=>(
              <button key={id} className="flt" onClick={()=>setFilter(id)} style={{background:filter===id?'rgba(56,197,255,.13)':'rgba(255,255,255,.04)',color:filter===id?'#38c5ff':'rgba(255,255,255,.4)',borderColor:filter===id?'rgba(56,197,255,.4)':'rgba(255,255,255,.07)'}}>{l}</button>
            ))}
          </div>
          {grouped.length===0?(<div style={{textAlign:'center',padding:'60px 20px'}}><div style={{fontSize:48,marginBottom:14}}>🏒</div><div style={{color:'#fff',fontWeight:800,fontSize:'1.2rem',marginBottom:8}}>Матчей нет</div><div style={{color:'rgba(255,255,255,.35)',fontSize:'.86rem'}}>Турнир стартует <span style={{color:'#38c5ff',fontWeight:700}}>15 мая 2026</span></div><div style={{color:'rgba(255,255,255,.2)',fontSize:'.78rem',marginTop:4}}>Переключись на "Все" → полное расписание</div></div>):(
            grouped.map(([day,ms])=>(<div key={day} style={{marginBottom:20}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><div style={{flex:1,height:1,background:'rgba(255,255,255,.05)'}}/><span style={{color:'rgba(255,255,255,.35)',fontSize:'.66rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',whiteSpace:'nowrap'}}>📅 {day}</span><div style={{flex:1,height:1,background:'rgba(255,255,255,.05)'}}/></div>{ms.map(m=><MatchCard key={m.id} match={m}/>)}</div>))
          )}
        </>)}
        {tab==='leaderboard'&&<Leaderboard/>}
      </div>

      {showAuth&&<AuthModal/>}
      {showProfile&&user&&<ProfileModal user={user} myPreds={myPreds} matches={matches} onClose={()=>setShowProfile(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
