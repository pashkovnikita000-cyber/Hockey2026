<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<div id="root"><div style="min-height:100vh;background:#04060d;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div style="font-size:48px">🏒</div><div style="color:rgba(255,255,255,.5);font-size:.95rem;font-family:system-ui">Загрузка...</div></div></div>

<style>
:root{--bg:#04060d;--surf:#0b0e1e;--surf2:#111828;--bdr:rgba(255,255,255,.07);--acc:#38c5ff;--gold:#f4b942;--grn:#4ade80;--red:#f87171;--dim:rgba(255,255,255,.5);--muted:rgba(255,255,255,.22)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
@keyframes fl0{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-26px) rotate(180deg)}}
@keyframes fl1{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px) rotate(-70deg)}}
@keyframes fl2{0%,100%{transform:translateY(0)}50%{transform:translateY(-36px) rotate(250deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(56,197,255,.25)}50%{box-shadow:0 0 24px rgba(56,197,255,.6),0 0 50px rgba(56,197,255,.15)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes tickNum{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .32s ease forwards;border-radius:16px;background:var(--surf);overflow:hidden;transition:transform .2s,box-shadow .2s;border:1px solid var(--bdr)}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(56,197,255,.1)}
.btn{background:linear-gradient(135deg,#38c5ff,#0055ff);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-weight:700;cursor:pointer;transition:all .2s;font-size:.84rem;white-space:nowrap;letter-spacing:-.2px}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 22px rgba(56,197,255,.45)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.ghost{background:rgba(255,255,255,.06);color:var(--dim);border:1px solid var(--bdr);border-radius:10px;padding:7px 13px;font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:600}
.ghost:hover{background:rgba(255,255,255,.1);color:#fff}
.tab{padding:9px 24px;border-radius:100px;border:none;cursor:pointer;font-weight:700;font-size:.88rem;transition:all .2s}
.flt{padding:5px 13px;border-radius:100px;cursor:pointer;font-size:.79rem;font-weight:600;transition:all .2s;border:1px solid}
.si{background:rgba(255,255,255,.08);border:2px solid rgba(56,197,255,.25);color:#fff;text-align:center;font-size:1.15rem;font-weight:800;border-radius:10px;width:48px;height:48px;transition:all .2s}
.si:focus{border-color:#38c5ff;box-shadow:0 0 0 3px rgba(56,197,255,.18);outline:none}
.ai{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:#fff;border-radius:12px;padding:13px 15px;width:100%;font-size:.93rem;transition:border-color .2s}
.ai:focus{border-color:#38c5ff;outline:none;background:rgba(56,197,255,.05)}
.ai::placeholder{color:rgba(255,255,255,.26)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(56,197,255,.22);border-radius:2px}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
</style>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,memo,useRef}=React;

const SUPA='https://uzvdmlqbsylxzikfqsum.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6dmRtbHFic3lseHppa2Zxc3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDQyODEsImV4cCI6MjA4NzgyMDI4MX0.csZNRs1POrpzflzwe5_pskZt2hg0LiH8Ib9-ZvFvDSU';

const FLAGS={FIN:'🇫🇮',GER:'🇩🇪',CAN:'🇨🇦',SWE:'🇸🇪',USA:'🇺🇸',SUI:'🇨🇭',CZE:'🇨🇿',DEN:'🇩🇰',GBR:'🇬🇧',AUT:'🇦🇹',SVK:'🇸🇰',NOR:'🇳🇴',HUN:'🇭🇺',LAT:'🇱🇻',SLO:'🇸🇮',ITA:'🇮🇹',TBD:'❓'};
const NAMES={FIN:'Finland',GER:'Germany',CAN:'Canada',SWE:'Sweden',USA:'USA',SUI:'Switzerland',CZE:'Czechia',DEN:'Denmark',GBR:'Gt. Britain',AUT:'Austria',SVK:'Slovakia',NOR:'Norway',HUN:'Hungary',LAT:'Latvia',SLO:'Slovenia',ITA:'Italy',TBD:'TBD'};
const TCOLS={FIN:'#003899',GER:'#1a1a1a',CAN:'#cc1122',SWE:'#006aa7',USA:'#002868',SUI:'#cc1122',CZE:'#d7141a',DEN:'#c60c30',GBR:'#012169',AUT:'#ed2939',SVK:'#0b4ea2',NOR:'#ef2b2d',HUN:'#588157',LAT:'#8b2635',SLO:'#003da5',ITA:'#009246',TBD:'#333'};
const PTCLS=Array.from({length:15},(_,i)=>({e:['🏒','❄️','⭐','🧊','✨','❄️'][i%6],l:((i*37+13)%97)+'%',t:((i*23+7)%93)+'%',s:(i%3)*6+11,o:(i%4)*.022+.03,d:(i%4)*2+6,dl:-(i*1.4),a:`fl${i%3}`}));

// Storage: localStorage with graceful fallback
const S={
  get:k=>{try{return localStorage.getItem(k);}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch{}},
  del:k=>{try{localStorage.removeItem(k);}catch{}}
};

const rq=async(m,t,q='',body,tok)=>{
  try{
    const r=await fetch(`${SUPA}/rest/v1/${t}${q}`,{method:m,headers:{apikey:KEY,Authorization:`Bearer ${tok||KEY}`,'Content-Type':'application/json',Prefer:'return=representation'},body:body?JSON.stringify(body):undefined});
    if(r.status>=400||r.status===204)return null;
    return r.json();
  }catch{return null;}
};
const authFetch=async(path,body)=>{try{return(await fetch(`${SUPA}/auth/v1/${path}`,{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify(body)})).json();}catch{return{};}};
const calcPts=(p,m)=>{
  if(m.home_score==null)return null;
  if(p.pred_home===m.home_score&&p.pred_away===m.away_score)return 3;
  return Math.sign(p.pred_home-p.pred_away)===Math.sign(m.home_score-m.away_score)?1:0;
};
const byDay=arr=>{const g={};arr.forEach(m=>{const k=new Date(m.match_time).toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});if(!g[k])g[k]=[];g[k].push(m);});return Object.entries(g);};

// Animated background
const Bg=memo(()=>(
  <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
    <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(56,197,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(56,197,255,.018) 1px,transparent 1px)',backgroundSize:'48px 48px'}}/>
    {PTCLS.map((p,i)=><div key={i} style={{position:'absolute',left:p.l,top:p.t,fontSize:p.s,opacity:p.o,animation:`${p.a} ${p.d}s ease-in-out ${p.dl}s infinite`}}>{p.e}</div>)}
  </div>
));

// Tournament countdown
const Countdown=()=>{
  const [t,setT]=useState(null);
  useEffect(()=>{
    const target=new Date('2026-05-15T14:20:00Z');
    const tick=()=>{const diff=target-Date.now();if(diff<=0){setT(null);return;}setT({d:Math.floor(diff/864e5),h:Math.floor(diff%864e5/36e5),m:Math.floor(diff%36e5/6e4),s:Math.floor(diff%6e4/1e3)});};
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);
  if(!t)return null;
  const C=({v,l})=>(
    <div style={{textAlign:'center',minWidth:52}}>
      <div key={v} style={{fontSize:'1.9rem',fontWeight:900,color:'#38c5ff',fontVariantNumeric:'tabular-nums',lineHeight:1,animation:'tickNum .15s ease'}}>{String(v).padStart(2,'0')}</div>
      <div style={{fontSize:'.58rem',color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:3}}>{l}</div>
    </div>
  );
  return(
    <div style={{background:'linear-gradient(135deg,rgba(56,197,255,.08),rgba(0,80,255,.06))',border:'1px solid rgba(56,197,255,.18)',borderRadius:16,padding:'14px 20px',marginBottom:18,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{flex:1,minWidth:120}}>
        <div style={{fontSize:'.66rem',color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.1em'}}>До старта турнира</div>
        <div style={{color:'#fff',fontWeight:700,fontSize:'.88rem',marginTop:3}}>🏒 IIHF WM 2026 · Швейцария</div>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        <C v={t.d} l="дней"/><div style={{color:'rgba(255,255,255,.18)',fontSize:'1.4rem',fontWeight:200,marginBottom:8}}>:</div>
        <C v={t.h} l="часов"/><div style={{color:'rgba(255,255,255,.18)',fontSize:'1.4rem',fontWeight:200,marginBottom:8}}>:</div>
        <C v={t.m} l="минут"/><div style={{color:'rgba(255,255,255,.18)',fontSize:'1.4rem',fontWeight:200,marginBottom:8}}>:</div>
        <C v={t.s} l="секунд"/>
      </div>
    </div>
  );
};

function App(){
  const [sess,setSess]=useState(()=>{const t=S.get('hk_tok');return t?{tok:t}:null;});
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('matches');
  const [filter,setFilter]=useState('all');
  const [matches,setMatches]=useState([]);
  const [myPreds,setMyPreds]=useState({});
  const [inputs,setInputs]=useState({});
  const [saving,setSaving]=useState({});
  const [flash,setFlash]=useState({});
  const [allPreds,setAllPreds]=useState([]);
  const [profs,setProfs]=useState({});
  const [showAuth,setShowAuth]=useState(false);
  const [mode,setMode]=useState('signin');
  const [fd,setFd]=useState({email:'',pwd:'',name:''});
  const [msg,setMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const [adminId,setAdminId]=useState(null);
  const [adminS,setAdminS]=useState({h:'',a:''});
  const now=useMemo(()=>new Date(),[]);

  useEffect(()=>{
    const hash=new URLSearchParams(window.location.hash.slice(1));
    const tok=hash.get('access_token');
    if(tok){
      if(window.opener){window.opener.postMessage({access_token:tok},'*');window.close();return;}
      doLogin(tok);history.replaceState({},'',location.pathname);
    } else if(sess?.tok){
      doLogin(sess.tok,true);
    }
    window.addEventListener('message',e=>{if(e.data?.access_token)doLogin(e.data.access_token);});
    loadMatches();
  },[]);

  useEffect(()=>{if(user)loadMyPreds();},[user]);
  useEffect(()=>{if(tab==='leaderboard')loadBoard();},[tab]);

  const doLogin=async(tok,silent=false)=>{
    const u=await fetch(`${SUPA}/auth/v1/user`,{headers:{apikey:KEY,Authorization:`Bearer ${tok}`}}).then(r=>r.json()).catch(()=>null);
    if(u?.id){S.set('hk_tok',tok);setSess({tok});setUser(u);if(!silent)setShowAuth(false);}
    else{S.del('hk_tok');setSess(null);}
  };
  const doLogout=()=>{S.del('hk_tok');setSess(null);setUser(null);setMyPreds({});};
  const getTok=()=>sess?.tok||S.get('hk_tok');

  const loadMatches=async()=>{const d=await rq('GET','matches','?order=match_time.asc');setMatches(d||[]);};
  const loadMyPreds=async()=>{
    const tok=getTok();if(!tok||!user)return;
    const d=await rq('GET','predictions',`?user_id=eq.${user.id}&select=match_id,pred_home,pred_away`,null,tok);
    const m={};(d||[]).forEach(p=>{m[p.match_id]=p;});setMyPreds(m);
  };
  const loadBoard=async()=>{
    const[pds,prs]=await Promise.all([rq('GET','predictions','?select=user_id,match_id,pred_home,pred_away'),rq('GET','profiles','?select=id,display_name,avatar_url')]);
    setAllPreds(pds||[]);const m={};(prs||[]).forEach(p=>{m[p.id]=p;});setProfs(m);
  };

  const board=useMemo(()=>{
    const mm={};matches.forEach(m=>{mm[m.id]=m;});
    const up={};
    (allPreds||[]).forEach(p=>{const m=mm[p.match_id];if(!m)return;const pts=calcPts(p,m)||0;if(!up[p.user_id])up[p.user_id]={pts:0,cnt:0};up[p.user_id].pts+=pts;up[p.user_id].cnt++;});
    return Object.entries(up).map(([uid,s])=>({uid,...s,prof:profs[uid]})).sort((a,b)=>b.pts-a.pts);
  },[allPreds,matches,profs]);

  const filtered=useMemo(()=>{
    const d0=new Date();d0.setHours(0,0,0,0);
    const d1=new Date(d0);d1.setDate(d1.getDate()+1);
    const d2=new Date(d0);d2.setDate(d2.getDate()+2);
    const d7=new Date(d0);d7.setDate(d7.getDate()+7);
    return matches.filter(m=>{const t=new Date(m.match_time);if(filter==='today')return t>=d0&&t<d1;if(filter==='tomorrow')return t>=d1&&t<d2;if(filter==='week')return t>=d0&&t<d7;return true;});
  },[matches,filter]);
  const grouped=useMemo(()=>byDay(filtered),[filtered]);

  const signIn=async()=>{setBusy(true);setMsg('');const r=await authFetch('token?grant_type=password',{email:fd.email,password:fd.pwd});setBusy(false);r.access_token?doLogin(r.access_token):setMsg(r.error_description||r.message||'Неверный email или пароль');};
  const signUp=async()=>{setBusy(true);setMsg('');const r=await authFetch('signup',{email:fd.email,password:fd.pwd,data:{full_name:fd.name}});setBusy(false);r.user?setMsg('✅ Письмо отправлено! Подтверди email и войди.'):setMsg(r.error_description||r.message||'Ошибка');};
  const googleAuth=()=>window.open(`${SUPA}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(location.href.split('#')[0])}`,'gauth','width=500,height=700,top=60,left=160');

  const setInp=(id,side,v)=>setInputs(p=>({...p,[id]:{...(p[id]||{}),[side]:v.replace(/\D/g,'')}}));
  const savePred=async id=>{
    if(!user){setShowAuth(true);return;}
    const inp=inputs[id]||{},ex=myPreds[id];
    const ph=parseInt(inp.h??(ex?.pred_home??'')),pa=parseInt(inp.a??(ex?.pred_away??''));
    if(isNaN(ph)||isNaN(pa))return;
    setSaving(p=>({...p,[id]:true}));
    const tok=getTok();
    ex?await rq('PATCH','predictions',`?user_id=eq.${user.id}&match_id=eq.${id}`,{pred_home:ph,pred_away:pa,updated_at:new Date().toISOString()},tok):await rq('POST','predictions','',{user_id:user.id,match_id:id,pred_home:ph,pred_away:pa},tok);
    setMyPreds(p=>({...p,[id]:{pred_home:ph,pred_away:pa}}));
    setSaving(p=>({...p,[id]:false}));setFlash(p=>({...p,[id]:true}));
    setTimeout(()=>setFlash(p=>({...p,[id]:false})),2400);
  };
  const saveScore=async()=>{
    const h=parseInt(adminS.h),a=parseInt(adminS.a);if(isNaN(h)||isNaN(a))return;
    await rq('PATCH','matches',`?id=eq.${adminId}`,{home_score:h,away_score:a,status:'finished'},getTok());
    setMatches(p=>p.map(m=>m.id===adminId?{...m,home_score:h,away_score:a,status:'finished'}:m));setAdminId(null);
  };

  const uName=user?.user_metadata?.full_name||user?.email?.split('@')[0]||'';
  const uAv=user?.user_metadata?.avatar_url;

  // ─── MATCH CARD ───────────────────────────────────────────────────────────
  const MatchCard=({match:m})=>{
    const pred=myPreds[m.id],inp=inputs[m.id]||{};
    const hV=inp.h!==undefined?inp.h:(pred?.pred_home??'');
    const aV=inp.a!==undefined?inp.a:(pred?.pred_away??'');
    const past=new Date(m.match_time)<now;
    const pts=pred&&m.home_score!=null?calcPts(pred,m):null;
    const fin=m.status==='finished'&&m.home_score!=null;
    const pc=pts===3?'#f4b942':pts===1?'#4ade80':pts===0?'#f87171':null;
    const tm=new Date(m.match_time).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const dt=new Date(m.match_time).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
    const playoff=['QF','SF','Bronze','Gold'].includes(m.group_name);
    const plbl={QF:'Четвертьфинал',SF:'Полуфинал',Bronze:'За бронзу',Gold:'Финал'}[m.group_name];
    const hWin=fin&&m.home_score>m.away_score,aWin=fin&&m.away_score>m.home_score;
    return(
      <div className="card" style={{marginBottom:12}}>
        {/* Team color gradient bar */}
        <div style={{height:3,background:`linear-gradient(90deg,${TCOLS[m.home_team]||'#222'} 0%,${TCOLS[m.home_team]||'#222'} 40%,transparent 50%,${TCOLS[m.away_team]||'#222'} 60%,${TCOLS[m.away_team]||'#222'} 100%)`}}/>
        <div style={{padding:'16px 18px'}}>
          {/* Main row: teams + center info */}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {/* Home */}
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative'}}>
              {hWin&&<div style={{position:'absolute',top:-4,right:0,fontSize:'.6rem',color:'#4ade80',fontWeight:700,background:'rgba(74,222,128,.1)',padding:'1px 6px',borderRadius:4}}>ПОБ</div>}
              <div style={{fontSize:30,lineHeight:1}}>{FLAGS[m.home_team]||'🏒'}</div>
              <div style={{color:hWin?'#fff':'rgba(255,255,255,.9)',fontWeight:800,fontSize:'.88rem',textAlign:'center',lineHeight:1.2}}>{NAMES[m.home_team]||m.home_team}</div>
            </div>
            {/* Center */}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,minWidth:104}}>
              {fin?(
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{color:hWin?'#fff':'rgba(255,255,255,.6)',fontSize:'2rem',fontWeight:900,fontVariantNumeric:'tabular-nums'}}>{m.home_score}</span>
                  <span style={{color:'rgba(255,255,255,.2)',fontSize:'1.2rem',fontWeight:200}}>:</span>
                  <span style={{color:aWin?'#fff':'rgba(255,255,255,.6)',fontSize:'2rem',fontWeight:900,fontVariantNumeric:'tabular-nums'}}>{m.away_score}</span>
                </div>
              ):(
                <div style={{background:'rgba(56,197,255,.1)',border:'1px solid rgba(56,197,255,.2)',borderRadius:8,padding:'4px 16px'}}>
                  <span style={{color:'#38c5ff',fontWeight:700,fontSize:'.88rem',letterSpacing:'3px'}}>VS</span>
                </div>
              )}
              <div style={{color:'rgba(255,255,255,.45)',fontSize:'.7rem',fontWeight:600}}>{tm} CEST · {dt}</div>
              <div style={{color:'rgba(255,255,255,.22)',fontSize:'.62rem',textAlign:'center',lineHeight:1.3,maxWidth:90}}>{m.venue?.split(',')[0]}</div>
              {!playoff&&m.group_name&&<span style={{background:'rgba(255,255,255,.06)',color:'rgba(255,255,255,.5)',borderRadius:5,padding:'2px 9px',fontSize:'.62rem',fontWeight:700,letterSpacing:'.05em'}}>ГР. {m.group_name}</span>}
              {playoff&&<span style={{background:'rgba(244,185,66,.1)',color:'#f4b942',borderRadius:5,padding:'2px 9px',fontSize:'.62rem',fontWeight:700}}>🏆 {plbl}</span>}
            </div>
            {/* Away */}
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative'}}>
              {aWin&&<div style={{position:'absolute',top:-4,left:0,fontSize:'.6rem',color:'#4ade80',fontWeight:700,background:'rgba(74,222,128,.1)',padding:'1px 6px',borderRadius:4}}>ПОБ</div>}
              <div style={{fontSize:30,lineHeight:1}}>{FLAGS[m.away_team]||'🏒'}</div>
              <div style={{color:aWin?'#fff':'rgba(255,255,255,.9)',fontWeight:800,fontSize:'.88rem',textAlign:'center',lineHeight:1.2}}>{NAMES[m.away_team]||m.away_team}</div>
            </div>
          </div>
          {/* Prediction input */}
          {!past&&m.home_team!=='TBD'&&(
            <div style={{marginTop:13,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.055)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{color:'rgba(255,255,255,.3)',fontSize:'.76rem',flex:1,minWidth:60}}>🎯 Прогноз</span>
              <input className="si" placeholder="0" maxLength={2} value={hV} onChange={e=>setInp(m.id,'h',e.target.value)}/>
              <span style={{color:'rgba(255,255,255,.25)',fontSize:'1.1rem'}}>:</span>
              <input className="si" placeholder="0" maxLength={2} value={aV} onChange={e=>setInp(m.id,'a',e.target.value)}/>
              <button className="btn" style={{flex:'1 1 110px',maxWidth:160,...(flash[m.id]?{background:'linear-gradient(135deg,#22c55e,#16a34a)'}:{})}} disabled={saving[m.id]} onClick={()=>savePred(m.id)}>
                {saving[m.id]?'⏳':flash[m.id]?'✓ Сохранено!':pred?'Обновить →':'Поставить →'}
              </button>
            </div>
          )}
          {/* Past match result */}
          {past&&pred&&(
            <div style={{marginTop:10,paddingTop:9,borderTop:'1px solid rgba(255,255,255,.045)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
              <span style={{color:'rgba(255,255,255,.32)',fontSize:'.77rem'}}>Прогноз: <strong style={{color:'#fff'}}>{pred.pred_home}:{pred.pred_away}</strong></span>
              {pts!==null&&<span style={{background:pc+'20',color:pc,borderRadius:100,padding:'3px 13px',fontWeight:700,fontSize:'.79rem'}}>{pts===3?'🎯 +3 pts':pts===1?'✅ +1 pt':'❌ 0 pts'}</span>}
            </div>
          )}
          {/* Admin: enter score */}
          {user&&past&&!fin&&(
            <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,.035)'}}>
              {adminId===m.id?(
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{color:'rgba(255,255,255,.28)',fontSize:'.73rem'}}>Итог:</span>
                  <input className="si" style={{width:42,height:36,fontSize:'.98rem'}} placeholder="0" value={adminS.h} onChange={e=>setAdminS(p=>({...p,h:e.target.value.replace(/\D/g,'')}))}/>
                  <span style={{color:'rgba(255,255,255,.25)'}}>:</span>
                  <input className="si" style={{width:42,height:36,fontSize:'.98rem'}} placeholder="0" value={adminS.a} onChange={e=>setAdminS(p=>({...p,a:e.target.value.replace(/\D/g,'')}))}/>
                  <button className="btn" style={{padding:'7px 14px',fontSize:'.79rem'}} onClick={saveScore}>💾 Записать</button>
                  <button className="ghost" style={{padding:'7px 10px'}} onClick={()=>setAdminId(null)}>✕</button>
                </div>
              ):(
                <button className="ghost" style={{padding:'3px 11px',fontSize:'.71rem'}} onClick={()=>{setAdminId(m.id);setAdminS({h:'',a:''});}}>📝 Ввести результат</button>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ─── AUTH MODAL ───────────────────────────────────────────────────────────
  const AuthModal=()=>(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16,animation:'popIn .2s ease'}} onClick={e=>{if(e.target===e.currentTarget)setShowAuth(false);}}>
      <div style={{background:'#0d1225',border:'1px solid rgba(56,197,255,.2)',borderRadius:24,padding:'30px 28px',width:'100%',maxWidth:380,boxShadow:'0 24px 80px rgba(0,0,0,.6)'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:34,marginBottom:8}}>🏒</div>
          <h2 style={{color:'#fff',fontWeight:800,fontSize:'1.4rem',margin:'0 0 5px'}}>{mode==='signin'?'Добро пожаловать!':'Регистрация'}</h2>
          <p style={{color:'rgba(255,255,255,.38)',fontSize:'.83rem',margin:0}}>{mode==='signin'?'Войди, чтобы делать прогнозы':'Создай аккаунт и участвуй'}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {mode==='signup'&&<input className="ai" placeholder="Имя (как тебя называть)" value={fd.name} onChange={e=>setFd(p=>({...p,name:e.target.value}))}/>}
          <input className="ai" placeholder="Email" type="email" value={fd.email} onChange={e=>setFd(p=>({...p,email:e.target.value}))}/>
          <input className="ai" placeholder="Пароль (мин. 6 символов)" type="password" value={fd.pwd} onChange={e=>setFd(p=>({...p,pwd:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&(mode==='signin'?signIn():signUp())}/>
          {msg&&<p style={{color:msg.startsWith('✅')?'#4ade80':'#f87171',margin:0,fontSize:'.81rem'}}>{msg}</p>}
          <button className="btn" style={{width:'100%',padding:'13px',marginTop:2,fontSize:'.95rem'}} disabled={busy} onClick={mode==='signin'?signIn:signUp}>
            {busy?'⏳':mode==='signin'?'→ Войти':'→ Зарегистрироваться'}
          </button>
          <div style={{display:'flex',alignItems:'center',gap:10,margin:'4px 0'}}>
            <div style={{flex:1,height:'1px',background:'rgba(255,255,255,.07)'}}/><span style={{color:'rgba(255,255,255,.22)',fontSize:'.78rem'}}>или</span><div style={{flex:1,height:'1px',background:'rgba(255,255,255,.07)'}}/>
          </div>
          <button onClick={googleAuth} style={{background:'#fff',color:'#1e1e1e',border:'none',borderRadius:12,padding:'13px',fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:'.9rem',transition:'box-shadow .2s'}} onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 18px rgba(0,0,0,.25)'} onMouseLeave={e=>e.currentTarget.style.boxShadow=''}>
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Войти через Google
          </button>
          <p style={{color:'rgba(255,255,255,.32)',textAlign:'center',fontSize:'.81rem',marginTop:4}}>
            {mode==='signin'?<>Нет аккаунта? <span style={{color:'#38c5ff',cursor:'pointer',fontWeight:600}} onClick={()=>{setMode('signup');setMsg('');}}>Зарегистрируйся</span></>:<>Уже есть? <span style={{color:'#38c5ff',cursor:'pointer',fontWeight:600}} onClick={()=>{setMode('signin');setMsg('');}}>Войди</span></>}
          </p>
        </div>
      </div>
    </div>
  );

  // ─── LEADERBOARD ─────────────────────────────────────────────────────────
  const Leaderboard=()=>{
    const podColors=[{c:'#f4b942',bg:'rgba(244,185,66,.1)',bdr:'rgba(244,185,66,.3)',h:130,sz:44,e:'🥇'},{c:'#c0c0c0',bg:'rgba(192,192,192,.08)',bdr:'rgba(192,192,192,.2)',h:108,sz:38,e:'🥈'},{c:'#cd7f32',bg:'rgba(205,127,50,.08)',bdr:'rgba(205,127,50,.18)',h:92,sz:32,e:'🥉'}];
    const Av=({p,sz,c})=>p?.avatar_url?<img src={p.avatar_url} style={{width:sz,height:sz,borderRadius:'50%',border:`2px solid ${c}`,display:'block',margin:'0 auto 6px'}} alt=""/>:<div style={{width:sz,height:sz,borderRadius:'50%',background:`${c}18`,border:`1px solid ${c}44`,display:'flex',alignItems:'center',justifyContent:'center',color:c,fontWeight:700,fontSize:sz*.38,margin:'0 auto 6px'}}>{(p?.display_name||'?')[0].toUpperCase()}</div>;
    return(
      <div>
        {board.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',color:'rgba(255,255,255,.3)'}}>
            <div style={{fontSize:44,marginBottom:12}}>🏆</div>
            Ещё нет прогнозов. Будь первым! 🎯
          </div>
        ):(
          <>
            {board.length>=3&&(
              <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:6,marginBottom:20}}>
                {[1,0,2].map(rank=>{const item=board[rank];const pc=podColors[rank];return(
                  <div key={rank} style={{flex:1,background:pc.bg,border:`1px solid ${pc.bdr}`,borderRadius:'14px 14px 0 0',padding:'14px 6px 14px',textAlign:'center',minHeight:pc.h,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                    <div style={{fontSize:rank===0?28:24,marginBottom:4}}>{pc.e}</div>
                    <Av p={item.prof} sz={pc.sz} c={pc.c}/>
                    <div style={{color:'#fff',fontWeight:700,fontSize:'.78rem',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.prof?.display_name||'Аноним'}</div>
                    <div style={{color:pc.c,fontWeight:900,fontSize:rank===0?'1.3rem':'1.1rem',lineHeight:1,marginTop:4}}>{item.pts}<span style={{fontSize:'.62rem',color:'rgba(255,255,255,.35)',fontWeight:400,marginLeft:2}}>pts</span></div>
                  </div>
                );})}
              </div>
            )}
            {board.slice(3).map((item,i)=>(
              <div key={item.uid} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 15px',marginBottom:7,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.055)',borderRadius:12,transition:'transform .15s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateX(3px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
                <div style={{color:'rgba(255,255,255,.28)',fontWeight:700,fontSize:'.88rem',minWidth:26,textAlign:'center'}}>#{i+4}</div>
                {item.prof?.avatar_url?<img src={item.prof.avatar_url} style={{width:34,height:34,borderRadius:'50%'}} alt=""/>:<div style={{width:34,height:34,borderRadius:'50%',background:'rgba(56,197,255,.1)',border:'1px solid rgba(56,197,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',color:'#38c5ff',fontWeight:700,fontSize:'.85rem'}}>{(item.prof?.display_name||'?')[0].toUpperCase()}</div>}
                <div style={{flex:1}}><div style={{color:'#fff',fontWeight:700,fontSize:'.9rem'}}>{item.prof?.display_name||'Аноним'}</div><div style={{color:'rgba(255,255,255,.28)',fontSize:'.72rem'}}>{item.cnt} прогнозов</div></div>
                <div style={{color:'#38c5ff',fontWeight:800,fontSize:'1.1rem'}}>{item.pts}<span style={{fontSize:'.63rem',color:'rgba(255,255,255,.28)',marginLeft:2}}>pts</span></div>
              </div>
            ))}
            <div style={{marginTop:18,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.055)',borderRadius:12,padding:'12px 16px',textAlign:'center'}}>
              <span style={{color:'rgba(255,255,255,.4)',fontSize:'.79rem'}}>🎯 <strong style={{color:'#f4b942'}}>+3 pts</strong> — точный счёт &nbsp;•&nbsp; ✅ <strong style={{color:'#4ade80'}}>+1 pt</strong> — победитель &nbsp;•&nbsp; ❌ <strong>0</strong> — промах</span>
            </div>
          </>
        )}
      </div>
    );
  };

  // ─── MAIN RENDER ─────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',position:'relative'}}>
      <Bg/>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(4,6,13,.92)',backdropFilter:'blur(24px)',borderBottom:'1px solid rgba(255,255,255,.055)',padding:'11px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:22}}>🏒</span>
          <div>
            <div style={{fontWeight:900,fontSize:'1rem',background:'linear-gradient(90deg,#38c5ff,#6699ff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'-.5px'}}>IIHF WM 2026</div>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.6rem',letterSpacing:'.12em',marginTop:1}}>ПРОГНОЗЫ · ШВЕЙЦАРИЯ</div>
          </div>
        </div>
        {user?(
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {uAv?<img src={uAv} style={{width:30,height:30,borderRadius:'50%',border:'2px solid rgba(56,197,255,.4)'}} alt=""/>:<div style={{width:30,height:30,borderRadius:'50%',background:'rgba(56,197,255,.12)',border:'1px solid rgba(56,197,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',color:'#38c5ff',fontWeight:700,fontSize:'.8rem'}}>{(uName[0]||'?').toUpperCase()}</div>}
            <span style={{color:'rgba(255,255,255,.7)',fontSize:'.85rem',fontWeight:600,maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{uName}</span>
            <button className="ghost" onClick={doLogout}>Выйти</button>
          </div>
        ):(
          <button className="btn" style={{padding:'8px 18px',animation:'glowPulse 2.5s ease-in-out infinite'}} onClick={()=>setShowAuth(true)}>Войти →</button>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',justifyContent:'center',gap:6,padding:'16px 18px 0',position:'relative',zIndex:1}}>
        {[['matches','🏒 Матчи'],['leaderboard','🏆 Лидерборд']].map(([id,l])=>(
          <button key={id} className="tab" onClick={()=>setTab(id)} style={{background:tab===id?'linear-gradient(135deg,#38c5ff,#0055ff)':'rgba(255,255,255,.055)',color:tab===id?'#fff':'rgba(255,255,255,.45)',border:tab===id?'none':'1px solid rgba(255,255,255,.08)'}}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{maxWidth:660,margin:'0 auto',padding:'16px 12px 70px',position:'relative',zIndex:1}}>
        {tab==='matches'&&(
          <>
            <Countdown/>
            <div style={{display:'flex',gap:7,marginBottom:16,flexWrap:'wrap'}}>
              {[['today','Сегодня'],['tomorrow','Завтра'],['week','Неделя'],['all','Все матчи']].map(([id,l])=>(
                <button key={id} className="flt" onClick={()=>setFilter(id)} style={{background:filter===id?'rgba(56,197,255,.14)':'rgba(255,255,255,.04)',color:filter===id?'#38c5ff':'rgba(255,255,255,.42)',borderColor:filter===id?'rgba(56,197,255,.45)':'rgba(255,255,255,.07)'}}>{l}</button>
              ))}
            </div>
            {grouped.length===0?(
              <div style={{textAlign:'center',padding:'64px 20px'}}>
                <div style={{fontSize:50,marginBottom:14}}>🏒</div>
                <div style={{color:'#fff',fontWeight:800,fontSize:'1.2rem',marginBottom:8}}>Матчей нет</div>
                <div style={{color:'rgba(255,255,255,.35)',fontSize:'.88rem'}}>Турнир стартует <span style={{color:'#38c5ff',fontWeight:700}}>15 мая 2026</span></div>
                <div style={{color:'rgba(255,255,255,.2)',fontSize:'.8rem',marginTop:4}}>Переключись на "Все матчи" → увидишь полное расписание</div>
              </div>
            ):(
              grouped.map(([day,ms])=>(
                <div key={day} style={{marginBottom:22}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:11}}>
                    <div style={{flex:1,height:'1px',background:'rgba(255,255,255,.055)'}}/>
                    <span style={{color:'rgba(255,255,255,.38)',fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',whiteSpace:'nowrap'}}>📅 {day}</span>
                    <div style={{flex:1,height:'1px',background:'rgba(255,255,255,.055)'}}/>
                  </div>
                  {ms.map(m=><MatchCard key={m.id} match={m}/>)}
                </div>
              ))
            )}
          </>
        )}
        {tab==='leaderboard'&&<Leaderboard/>}
      </div>

      {showAuth&&<AuthModal/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
